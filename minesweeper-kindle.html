<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minesweeper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #000;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px 28px;
    min-height: 100vh;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── TITLE ───────────────────────────────────── */
  .title {
    font-size: 2.2rem;
    font-weight: bold;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 12px;
  }

  /* ── HEADER ──────────────────────────────────── */
  .header {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
  }

  .level-box {
    border: 3px solid #000;
    padding: 7px 6px;
    text-align: center;
    flex: 1;
    cursor: pointer;
    font-family: Georgia, serif;
    font-size: 0.8rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #fff;
  }
  .level-box.active { background: #000; color: #fff; }
  .level-box:active { opacity: 0.7; }

  .btn {
    border: 3px solid #000;
    background: #000;
    color: #fff;
    font-size: 0.85rem;
    font-weight: bold;
    padding: 10px 14px;
    cursor: pointer;
    font-family: Georgia, serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:active { background: #444; }

  /* ── STATS BAR ───────────────────────────────── */
  .stats {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 7px;
    margin-bottom: 10px;
  }

  .stat-box {
    border: 3px solid #000;
    padding: 6px 10px;
    text-align: center;
    flex: 1;
  }
  .stat-label {
    font-size: 0.62rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: block;
  }
  .stat-value {
    font-size: 1.4rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
  }

  /* ── MODE TOGGLE ─────────────────────────────── */
  .mode-bar {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 7px;
    margin-bottom: 10px;
  }

  .mode-btn {
    flex: 1;
    border: 3px solid #000;
    background: #fff;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
  }
  .mode-btn:active  { opacity: 0.7; }
  .mode-btn.active  { background: #000; color: #fff; }

  /* ── GRID ────────────────────────────────────── */
  .grid-wrap {
    width: 100%;
    max-width: 520px;
    border: 4px solid #000;
  }

  .mine-grid {
    display: grid;
    width: 100%;
    border-top: 1px solid #888;
    border-left: 1px solid #888;
  }

  .cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #888;
    border-bottom: 1px solid #888;
    cursor: pointer;
    font-family: 'Courier New', Georgia, monospace;
    font-weight: bold;
    position: relative;
    background: #e8e8e8;  /* unrevealed = light gray */
  }

  /* revealed */
  .cell.open {
    background: #fff;
    cursor: default;
  }

  /* flagged */
  .cell.flag {
    background: #c0c0c0;
  }

  /* mine exploded */
  .cell.boom {
    background: #000;
    color: #fff;
  }

  /* all mines shown at game over */
  .cell.mine-show {
    background: #555;
    color: #fff;
  }

  /* wrong flag */
  .cell.wrong-flag {
    background: #888;
    color: #fff;
  }

  /* number colors — grayscale for e-ink */
  .n1 { color: #000; }
  .n2 { color: #222; }
  .n3 { color: #333; }
  .n4 { color: #444; }
  .n5 { color: #555; }
  .n6 { color: #555; }
  .n7 { color: #666; }
  .n8 { color: #777; }

  /* ── MESSAGE ─────────────────────────────────── */
  .msg {
    margin-top: 12px;
    font-size: 1.3rem;
    font-weight: bold;
    text-align: center;
    border: 3px solid #000;
    padding: 12px 20px;
    max-width: 520px;
    width: 100%;
    display: none;
  }
  .msg.show { display: block; }
  .msg.win  { background: #000; color: #fff; }

  /* ── LEGEND ──────────────────────────────────── */
  .legend {
    margin-top: 12px;
    font-size: 0.75rem;
    color: #444;
    text-align: center;
    line-height: 1.8;
    max-width: 520px;
  }
  .legend b { color: #000; }
</style>
</head>
<body>

<div class="title">Minesweeper</div>

<!-- Level select + New game -->
<div class="header">
  <div class="level-box active" id="lvl-easy"   onclick="setLevel('easy')">Dễ</div>
  <div class="level-box"        id="lvl-medium" onclick="setLevel('medium')">Vừa</div>
  <div class="level-box"        id="lvl-hard"   onclick="setLevel('hard')">Khó</div>
  <button class="btn" onclick="newGame()">Mới</button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-box">
    <span class="stat-label">💣 Còn lại</span>
    <div class="stat-value" id="mine-count">0</div>
  </div>
  <div class="stat-box">
    <span class="stat-label">⏱ Thời gian</span>
    <div class="stat-value" id="timer">00:00</div>
  </div>
  <div class="stat-box">
    <span class="stat-label">🏆 Kỷ lục</span>
    <div class="stat-value" id="best">--:--</div>
  </div>
</div>

<!-- Mode toggle -->
<div class="mode-bar">
  <button class="mode-btn active" id="mode-dig"  onclick="setMode('dig')">⛏ Đào ô</button>
  <button class="mode-btn"        id="mode-flag" onclick="setMode('flag')">🚩 Đặt cờ</button>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="mine-grid" id="mine-grid"></div>
</div>

<div class="msg" id="msg"></div>

<div class="legend">
  <b>⛏ Đào ô</b>: bấm để mở ô &nbsp;|&nbsp; <b>🚩 Đặt cờ</b>: bấm để đánh dấu mìn<br>
  Số trong ô = số mìn xung quanh &nbsp;|&nbsp; Mở hết ô an toàn = thắng
</div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════ */
var LEVELS = {
  easy:   { rows: 8,  cols: 8,  mines: 10 },
  medium: { rows: 12, cols: 10, mines: 25 },
  hard:   { rows: 16, cols: 10, mines: 45 }
};

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
var rows, cols, totalMines;
var board;       // { mine, revealed, flagged, count }
var gameOver, gameWon, firstClick;
var mode = 'dig';
var level = 'easy';
var timerSec = 0, timerID = null;
var bestTimes = { easy: null, medium: null, hard: null };

/* ═══════════════════════════════════════════════════
   SETUP
   ═══════════════════════════════════════════════════ */
function setLevel(lv) {
  level = lv;
  ['easy','medium','hard'].forEach(function(l) {
    document.getElementById('lvl-' + l).classList.toggle('active', l === lv);
  });
  newGame();
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-dig').classList.toggle('active',  m === 'dig');
  document.getElementById('mode-flag').classList.toggle('active', m === 'flag');
}

function newGame() {
  var cfg = LEVELS[level];
  rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;

  gameOver   = false;
  gameWon    = false;
  firstClick = true;
  mode       = 'dig';
  setMode('dig');

  board = [];
  for (var i = 0; i < rows * cols; i++) {
    board.push({ mine: false, revealed: false, flagged: false, count: 0 });
  }

  clearInterval(timerID);
  timerSec = 0;
  updateTimer();

  var m = document.getElementById('msg');
  m.className = 'msg';

  updateMineCount();
  renderGrid();
  updateBestDisplay();
}

function placeMines(safeIdx) {
  var indices = [];
  for (var i = 0; i < rows * cols; i++) {
    if (i !== safeIdx) indices.push(i);
  }
  // shuffle
  for (var i = indices.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = indices[i]; indices[i] = indices[j]; indices[j] = t;
  }
  for (var k = 0; k < totalMines; k++) board[indices[k]].mine = true;

  // compute counts
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      if (board[r * cols + c].mine) continue;
      var cnt = 0;
      forNeighbors(r, c, function(nr, nc) {
        if (board[nr * cols + nc].mine) cnt++;
      });
      board[r * cols + c].count = cnt;
    }
  }
}

function forNeighbors(r, c, fn) {
  for (var dr = -1; dr <= 1; dr++)
    for (var dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      var nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
    }
}

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
function cellFontSize() {
  // dynamic based on grid size
  if (cols <= 8)  return 'clamp(1rem, 5vw, 1.8rem)';
  if (cols <= 10) return 'clamp(0.8rem, 4vw, 1.4rem)';
  return 'clamp(0.7rem, 3.5vw, 1.2rem)';
}

function renderGrid() {
  var grid = document.getElementById('mine-grid');
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  grid.innerHTML = '';

  var fs = cellFontSize();

  for (var i = 0; i < rows * cols; i++) {
    var cell  = document.createElement('div');
    var c     = board[i];
    var r     = Math.floor(i / cols), col = i % cols;
    var cls   = 'cell';

    cell.style.fontSize = fs;

    if (c.revealed) {
      if (c.mine) {
        cls += ' boom';
        cell.textContent = '✕';
      } else {
        cls += ' open';
        if (c.count > 0) {
          cell.textContent = c.count;
          cls += ' n' + c.count;
        }
      }
    } else if (c.flagged) {
      cls += ' flag';
      cell.textContent = '⚑';
    } else if (gameOver && c.mine) {
      cls += ' mine-show';
      cell.textContent = '✕';
    }

    cell.className = cls;
    cell.dataset.idx = i;
    cell.addEventListener('click', onCellClick);
    grid.appendChild(cell);
  }
}

/* ═══════════════════════════════════════════════════
   INTERACTION
   ═══════════════════════════════════════════════════ */
function onCellClick(e) {
  var idx = parseInt(e.currentTarget.dataset.idx);
  var r   = Math.floor(idx / cols), c = idx % cols;
  handleCell(r, c);
}

function handleCell(r, c) {
  if (gameOver || gameWon) return;
  var cell = board[r * cols + c];

  if (mode === 'flag') {
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
    updateMineCount();
    renderGrid();
    return;
  }

  // dig mode
  if (cell.flagged || cell.revealed) return;

  // first click: place mines, start timer
  if (firstClick) {
    firstClick = false;
    placeMines(r * cols + c);
    timerID = setInterval(function() { timerSec++; updateTimer(); }, 1000);
  }

  if (cell.mine) {
    cell.revealed = true;
    endGame(false);
    return;
  }

  reveal(r, c);
  renderGrid();
  checkWin();
}

function reveal(r, c) {
  var cell = board[r * cols + c];
  if (cell.revealed || cell.flagged || cell.mine) return;
  cell.revealed = true;
  if (cell.count === 0) {
    forNeighbors(r, c, function(nr, nc) { reveal(nr, nc); });
  }
}

function endGame(won) {
  clearInterval(timerID);
  gameOver = !won;
  gameWon  = won;

  if (won) {
    // record best
    if (!bestTimes[level] || timerSec < bestTimes[level]) {
      bestTimes[level] = timerSec;
      updateBestDisplay();
    }
    var m2 = Math.floor(timerSec / 60), s2 = timerSec % 60;
    showMsg('🎉 Bạn thắng! ' + (m2 > 0 ? m2 + ' phút ' : '') + s2 + ' giây', true);
  } else {
    showMsg('💥 Bạn đã đạp phải mìn! Bấm Mới để thử lại.', false);
  }
  renderGrid();
}

function checkWin() {
  for (var i = 0; i < rows * cols; i++) {
    var c = board[i];
    if (!c.mine && !c.revealed) return;
  }
  endGame(true);
}

/* ═══════════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════════ */
function updateMineCount() {
  var flags = board.filter(function(c){ return c.flagged; }).length;
  document.getElementById('mine-count').textContent = totalMines - flags;
}

function updateTimer() {
  var m = Math.floor(timerSec / 60), s = timerSec % 60;
  document.getElementById('timer').textContent =
    (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function updateBestDisplay() {
  var b = bestTimes[level];
  if (b === null) {
    document.getElementById('best').textContent = '--:--';
  } else {
    var m = Math.floor(b / 60), s = b % 60;
    document.getElementById('best').textContent =
      (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }
}

function showMsg(text, isWin) {
  var m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg show' + (isWin ? ' win' : '');
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
   ═══════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'f' || e.key === 'F') setMode(mode === 'dig' ? 'flag' : 'dig');
  if (e.key === 'r' || e.key === 'R') newGame();
});

/* ── START ───────────────────────────────────────── */
newGame();
</script>
</body>
</html>
