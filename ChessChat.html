/* ═══════════════════════════════════════════════════
   BOARD SIZING — chỉ gọi khi resize, không gọi mỗi nước
   ═══════════════════════════════════════════════════ */
var gCellH = 0;  /* cache để tránh đọc offsetWidth liên tục */

function fixBoardSize(){
  var bd=document.getElementById('board');
  var w=bd.offsetWidth;
  if(!w) return;
  bd.style.height=w+'px';
  var cellH=Math.floor(w/8);
  if(cellH===gCellH) return;  /* không thay đổi — bỏ qua */
  gCellH = cellH;
  var fontSize=Math.floor(cellH*0.75);
  var cells=bd.children;
  for(var i=0;i<cells.length;i++){
    cells[i].style.height=cellH+'px';
    cells[i].style.lineHeight=cellH+'px';
    cells[i].style.fontSize=fontSize+'px';
  }
}

/* ═══════════════════════════════════════════════════
   PERSISTENT BOARD — build 1 lần, update sau đó
   ═══════════════════════════════════════════════════ */

/* Mảng tham chiếu đến 64 cell và các node con — index theo sq() */
var gCells = [];       /* gCells[sq] = div.sq */
var gPieceSpans = [];  /* gPieceSpans[sq] = span.piece */
var gDotMarkers = [];  /* gDotMarkers[sq] = div.dot-marker */
var gRingMarkers = []; /* gRingMarkers[sq] = div.ring-marker */
var gBoardBuilt = false;
var gLastFlip = false;  /* theo dõi flip để rebuild khi đổi bên */

function buildBoardOnce(){
  var bd=document.getElementById('board');
  bd.innerHTML='';
  /* Event delegation — 1 handler trên board thay vì 192 handler trên ô */
  bd.onclick = onSqClick;
  bd.ontouchstart = onSqFastInput;
  bd.onmousedown = onSqFastInput;
  gCells=[]; gPieceSpans=[]; gDotMarkers=[]; gRingMarkers=[];
  for(var dr=0;dr<8;dr++){
    for(var dc=0;dc<8;dc++){
      var rank=gFlip?dr:7-dr;
      var file=gFlip?7-dc:dc;
      var s=sq(rank,file);
      var cell=document.createElement('div');
      var baseColor=(rank+file)%2===1?'sq lite':'sq dark';
      cell.className=baseColor;
      cell.setAttribute('data-s', s);
      /* Pre-create piece span */
      var sp=document.createElement('span');
      sp.className='piece';
      cell.appendChild(sp);
      /* Pre-create dot marker (empty square) */
      var dot=document.createElement('div');
      dot.className='dot-marker hidden';
      cell.appendChild(dot);
      /* Pre-create ring marker (occupied square) */
      var ring=document.createElement('div');
      ring.className='ring-marker hidden';
      cell.appendChild(ring);
      bd.appendChild(cell);
      gCells[s]=cell;
      gPieceSpans[s]=sp;
      gDotMarkers[s]=dot;
      gRingMarkers[s]=ring;
    }
  }
  gBoardBuilt=true;
  gLastFlip=gFlip;
  gCellH=0;  /* force fixBoardSize recalc */
  fixBoardSize();
}

function renderBoard(){
  /* Xây board lần đầu hoặc khi flip đổi */
  if(!gBoardBuilt || gFlip!==gLastFlip) buildBoardOnce();
  var kingSq=-1;
  if(gActive&&inCheck(gB,gTurn)){
    for(var i=0;i<64;i++) if(gB[i]===gTurn*6){kingSq=i;break;}
  }
  for(var dr=0;dr<8;dr++){
    for(var dc=0;dc<8;dc++){
      var rank=gFlip?dr:7-dr;
      var file=gFlip?7-dc:dc;
      var s=sq(rank,file);
      var p=gB[s];
      var cell=gCells[s];
      /* Tính className mới */
      var cls=(rank+file)%2===1?'sq lite':'sq dark';
      if(gLast&&s===gLast[0]) cls+=' lm-f';
      if(gLast&&s===gLast[1]) cls+=' lm-t';
      if(s===kingSq)          cls+=' chk';
      if(s===gSel)            cls+=' sel';
      if(cell.className!==cls) cell.className=cls;
      /* Cập nhật quân cờ */
      var sp=gPieceSpans[s];
      var sym=p?SYM[typ(p)][col(p)===W?0:1]:'';
      if(sp.textContent!==sym) sp.textContent=sym;
      /* Marker: ẩn hết — renderSelectionHints() sẽ bật lại */
      gDotMarkers[s].className='dot-marker hidden';
      gRingMarkers[s].className='ring-marker hidden';
    }
  }
  renderSelectionHints();
  /* KHÔNG gọi fixBoardSize() ở đây */
}

function clsAdd(el, name){
  if((' '+el.className+' ').indexOf(' '+name+' ')<0) el.className += ' '+name;
}

function clsRemove(el, name){
  el.className = (' '+el.className+' ').replace(' '+name+' ', ' ').replace(/^\s+|\s+$/g, '');
}

function renderSelectionHints(){
  for(var j=0;j<64;j++){
    var cell=gCells[j]; if(!cell) continue;
    var cls=cell.className;
    /* Xóa sel nếu có */
    cls=cls.replace(' sel','');
    if(j===gSel){
      if(cell.className!==cls+' sel') cell.className=cls+' sel';
      gDotMarkers[j].className='dot-marker hidden';
      gRingMarkers[j].className='ring-marker hidden';
    } else {
      if(cell.className!==cls) cell.className=cls;
      var hasLegal=false;
      for(var k=0;k<gLegal.length;k++) if(gLegal[k][1]===j){hasLegal=true;break;}
      if(hasLegal){
        if(gB[j]){
          gRingMarkers[j].className='ring-marker';
        } else {
          gDotMarkers[j].className='dot-marker';
        }
      } else {
        gDotMarkers[j].className='dot-marker hidden';
        gRingMarkers[j].className='ring-marker hidden';
      }
    }
  }
}

/* Đếm số lần vị trí hiện tại xuất hiện trong lịch sử */
function countRep(hash){
  var c=0;
  for(var i=0;i<gPosHist.length;i++) if(gPosHist[i]===hash) c++;
  return c;
}

function setStatusText(el, cls, txt){
  if(el.className !== cls) el.className = cls;
  if(el.textContent !== txt) el.textContent = txt;
}

function setStatus(){
  var el=document.getElementById('status');
  var isChk=inCheck(gB,gTurn);
  var mvs=gAllLegal;
  var tn=gTurn===W?'Tr\u1eafng':'\u0110en';
  var yours=gTurn===gPC;
  if(!mvs.length){
    gActive=false;
    if(isChk){
      var winner = gTurn===W ? '\u0110en' : 'Tr\u1eafng';
      var youWin = (gTurn!==gPC);  /* gTurn bị chiếu hết → gTurn thua */
      var chatEnd = youWin ? '  \u2014 '+randChat('youWin') : '  \u2014 '+randChat('aiWin');
      setStatusText(el,'status gameover','\u265b Chi\u1ebfu h\u1ebft! '+winner+' th\u1eafng!'+chatEnd);
      rankUpdate(youWin ? 1 : -1);
    } else {
      setStatusText(el,'status gameover','\u00bd H\u00f2a c\u1edd \u2014 Stalemate');
    }
    showStats();
    return;
  }
  if(gHalf>=100){
    gActive=false;
    setStatusText(el,'status gameover','\u00bd H\u00f2a c\u1edd \u2014 Quy t\u1eafc 50 n\u01b0\u1edbc');
    showStats();
    return;
  }
  if(countRep(gHash)>=3){
    gActive=false;
    setStatusText(el,'status gameover','\u00bd H\u00f2a c\u1edd \u2014 L\u1eb7p v\u1ecb tr\u00ed 3 l\u1ea7n');
    showStats();
    return;
  }
  if(isChk){
    setStatusText(el,'status check','\u26a0 '+tn+' \u0111ang b\u1ecb chi\u1ebfu!'+(yours?' H\u00e3y \u0111i!':''));
  } else if(yours){
    gThinkingText = '';  /* reset để lần sau máy chọn câu thinking mới */
    gDramaticChat = ''; gDramaticLabel = '';
    if(gDrawOffer){
      setStatusText(el,'status',gChatMsg || randChat('offerDraw'));
      return;
    }
    if(gChatMsg){
      setStatusText(el,'status',gChatMsg);
      /* Timer CHAT_DISPLAY_TIME: thay chat B bằng yourTurn sau 5 giây */
      clearThinkTimer();
      gThinkTimer = setTimeout(function(){
        gThinkTimer = null;
        if(!gActive || gTurn!==gPC || gDrawOffer) return;
        gChatMsg = '';
        var el2 = document.getElementById('status');
        if(el2){
          var txt;
          if(gMoveNum <= 1){
            txt = 'L\u01b0\u1ee3t c\u1ee7a b\u1ea1n';
          } else {
            txt = (Math.random() < CHAT_PROB_YOUR_TURN_GENERIC) ? 'L\u01b0\u1ee3t c\u1ee7a b\u1ea1n' : randChat('yourTurn');
          }
          setStatusText(el2,'status',txt);
        }
        scheduleThinkLong();
      }, CHAT_DISPLAY_TIME);
    } else {
      /* Chưa có chat: hiện "Lượt của bạn" đơn giản nếu chưa ai đi,
         pool yourTurn (có thể mang ý "mình đi rồi, bạn đi đi") chỉ hiện sau nước đầu */
      var turnTxt;
      if(gMoveNum <= 1){
        turnTxt = (Math.random() < CHAT_PROB_OPENING_EARLY) ? randChat('openingEarly') : 'L\u01b0\u1ee3t c\u1ee7a b\u1ea1n';
      } else {
        turnTxt = (Math.random() < CHAT_PROB_YOUR_TURN_GENERIC) ? 'L\u01b0\u1ee3t c\u1ee7a b\u1ea1n' : randChat('yourTurn');
      }
      setStatusText(el,'status',turnTxt);
      scheduleThinkLong();
    }
  } else {
    /* Máy đang suy nghĩ — thứ tự ưu tiên:
       1. dramatic = brilliant/blunder → ưu tiên tuyệt đối dù có chiếu hay không
       2. Máy đang bị chiếu → underPressure
       3. dramatic còn lại (great/greatDef/missedMate/missedWin) → chat dramatic
       4. Còn lại → 70% "Máy đang suy nghĩ...", 30% randChat('thinking') */
    clearThinkTimer();
    var thinkTxt;
    if(gDramaticChat && (gDramaticLabel === 'brilliant' || gDramaticLabel === 'blunder')){
      thinkTxt = gDramaticChat;
      /* Nếu gPlayerDramatic còn active, giữ lại gDramaticChat để aiMove dùng làm gChatMsg */
      if(!gPlayerDramatic){ gDramaticChat = ''; gDramaticLabel = ''; }
    } else if(inCheck(gB, gTurn)){
      if(!gThinkingText) gThinkingText = randChat('underPressure');
      thinkTxt = gThinkingText;
    } else if(gDramaticChat){
      thinkTxt = gDramaticChat;
      gDramaticChat = ''; gDramaticLabel = '';
    } else {
      if(!gThinkingText){
        gThinkingText = (Math.random() < CHAT_PROB_THINKING_GENERIC)
          ? 'Máy đang suy nghĩ...'
          : randChat('thinking');
      }
      thinkTxt = gThinkingText;
    }
    setStatusText(el,'status thinking',thinkTxt);
  }
}
/* ═══════════════════════════════════════════════════
   INTERACTION
   ═══════════════════════════════════════════════════ */
var gLastFastInputTime = 0;

function onSqFastInput(e){
  var now = Date.now();
  if(gLastFastInputTime && now-gLastFastInputTime<120){
    if(e && e.preventDefault) e.preventDefault();
    return false;
  }
  gLastFastInputTime = now;
  if(e && e.preventDefault) e.preventDefault();
  onSqClick(e, true);
  return false;
}

function onSqClick(e, fromTouch){
  if(!fromTouch && gLastFastInputTime && Date.now()-gLastFastInputTime<700) return false;
  if(!gActive||gTurn!==gPC) return;
  var tgt=e.target||e.srcElement;
  while(tgt&&tgt.getAttribute&&!tgt.getAttribute('data-s')) tgt=tgt.parentNode;
  if(!tgt||!tgt.getAttribute) return;
  var s=parseInt(tgt.getAttribute('data-s'));
  var p=gB[s];
  if(gSel>=0){
    var targets=[];
    for(var i=0;i<gLegal.length;i++) if(gLegal[i][1]===s) targets.push(gLegal[i]);
    if(targets.length){
      if(targets[0][3]) showPromo(targets);
      else execMove(targets[0]);
      return;
    }
  }
  if(p&&col(p)===gPC){
    gSel=s;
    gLegal=[];
    for(var i=0;i<gAllLegal.length;i++) if(gAllLegal[i][0]===s) gLegal.push(gAllLegal[i]);
    renderSelectionHints();
  } else {
    gSel=-1; gLegal=[];
    renderSelectionHints();
  }
  return false;
}

/* ── Blunder detection helpers ─────────────────────────
   Chỉ gọi blunder khi có bằng chứng cụ thể trên bàn cờ,
   tránh phụ thuộc vào cpLoss dễ sai do depth/góc nhìn.   */

/* Điều kiện A: nước máy sẽ đi (pendingBest) ăn quân nặng của người */
function aiWillCaptureHeavy(board, pendingBest, playerCol){
  if(!pendingBest || !pendingBest[2]) return false;
  var captured = pendingBest[2];
  /* quân bị ăn phải là của người (playerCol) và nặng >= mã/tượng (typ >= 2) */
  return col(captured) === playerCol && typ(captured) >= 2;
}

/* Điều kiện B: người vừa không ăn quân nặng máy mà hoàn toàn có thể ăn được.
   "Hoàn toàn có thể" = quân đó không được bảo vệ bởi bất kỳ quân máy nào
   (hanging piece — an toàn để ăn không sợ mất quân tương đương).
   playerMv  = nước vừa đi của người
   boardBefore = bàn cờ TRƯỚC nước người đi
   playerCol = màu của người */
function playerMissedHanging(boardBefore, playerMv, playerCol){
  var aiCol = -playerCol;
  /* Nếu người vừa ăn quân nặng thì không tính blunder */
  if(playerMv[2] && typ(playerMv[2]) >= 2) return false;
  /* Duyệt toàn bộ ô tìm quân nặng máy bị treo */
  for(var sq2 = 0; sq2 < 64; sq2++){
    var piece = boardBefore[sq2];
    if(!piece || col(piece) !== aiCol) continue;
    if(typ(piece) < 2) continue;          /* bỏ qua tốt và vua */
    /* Quân máy tại sq2: kiểm tra có bị tấn công bởi người không */
    if(!attacked(boardBefore, sq2, playerCol)) continue;
    /* Kiểm tra nó có được bảo vệ bởi máy không — nếu không bảo vệ thì hanging */
    if(!attacked(boardBefore, sq2, aiCol)) return true;
  }
  return false;
}

/* SEE đơn giản (Static Exchange Evaluation) tại ô toSq sau khi người vừa đi quân đến đó.
   Trả về true nếu người bị thua vật chất khi bị ăn lại (dù có người bảo vệ).
   Ví dụ: Xe đi vào ô bị Tốt máy tấn công và được Xe khác bảo vệ → Xe đổi Tốt → thua chất.
   Chỉ cần 1 lớp exchange để bắt trường hợp phổ biến nhất. */
function seeNegative(boardAfter, toSq, playerCol){
  var aiCol = -playerCol;
  var mover = boardAfter[toSq];
  if(!mover) return false;
  var moverVal = PVAL[typ(mover)];
  /* Tìm quân máy có giá trị nhỏ nhất đang tấn công toSq */
  var minAttVal = 99999;
  var r=rk(toSq), f=fl(toSq), i, nr, nf, pp, t;
  /* Tốt máy */
  var pr = aiCol===W ? r-1 : r+1;
  for(var df=-1;df<=1;df+=2){
    if(ob(pr,f+df) && boardAfter[sq(pr,f+df)]===aiCol){ minAttVal=Math.min(minAttVal,PVAL[1]); break; }
  }
  /* Mã máy */
  for(i=0;i<DIRS_N.length;i++){
    nr=r+DIRS_N[i][0]; nf=f+DIRS_N[i][1];
    if(ob(nr,nf) && boardAfter[sq(nr,nf)]===aiCol*2){ minAttVal=Math.min(minAttVal,PVAL[2]); break; }
  }
  /* Tượng/Hậu chéo */
  for(i=0;i<DIRS_B.length;i++){
    nr=r+DIRS_B[i][0]; nf=f+DIRS_B[i][1];
    while(ob(nr,nf)){
      pp=boardAfter[sq(nr,nf)];
      if(pp){ t=typ(pp); if(col(pp)===aiCol&&(t===3||t===5)) minAttVal=Math.min(minAttVal,PVAL[t]); break; }
      nr+=DIRS_B[i][0]; nf+=DIRS_B[i][1];
    }
  }
  /* Xe/Hậu thẳng */
  for(i=0;i<DIRS_R.length;i++){
    nr=r+DIRS_R[i][0]; nf=f+DIRS_R[i][1];
    while(ob(nr,nf)){
      pp=boardAfter[sq(nr,nf)];
      if(pp){ t=typ(pp); if(col(pp)===aiCol&&(t===4||t===5)) minAttVal=Math.min(minAttVal,PVAL[t]); break; }
      nr+=DIRS_R[i][0]; nf+=DIRS_R[i][1];
    }
  }
  if(minAttVal===99999) return false;  /* không bị tấn công */
  /* Nếu quân máy nhỏ hơn quân người thì ăn luôn có lợi → blunder */
  if(minAttVal < moverVal) return true;
  /* Nếu bằng giá trị: chỉ blunder nếu không có người bảo vệ */
  if(minAttVal === moverVal && !attacked(boardAfter, toSq, playerCol)) return true;
  return false;
}

/* Điều kiện C (đã sửa): người vừa đi quân nặng vào ô bị thua exchange.
   Dùng SEE thay vì chỉ kiểm tra attacked/defended đơn giản. */
function playerPieceHangsAfterMove(boardAfter, playerMv, playerCol){
  var toSq = playerMv[1];
  var piece = boardAfter[toSq];
  if(!piece || col(piece) !== playerCol) return false;
  if(typ(piece) < 2) return false;  /* tốt không tính */
  return seeNegative(boardAfter, toSq, playerCol);
}

function execMove(mv){
  var isPlayerMove = (gTurn === gPC);
  var savedBest = gPendingBest;
  var savedEval = gPendingEval;
  if(isPlayerMove){ aiDbgClear(); clearThinkTimer(); }
  if(isPlayerMove) { _tResult = []; tStart('total'); tMark('playerMoved'); }
  if(isPlayerMove) gBlunderHandled = false;  /* reset mỗi lượt — tránh stale true từ lượt trước */
  if(isPlayerMove && gDrawOffer) gDrawOfferDeclined=true;
  if(isPlayerMove) clearDrawOffer();

  addHistory(mv);
  gUciHist.push(mvUci(mv));
  gLast=mv;
  /* Track quân bị ăn (chỉ quân nặng typ 2-5) */
  if(mv[2]){
    var ct=typ(mv[2]);
    if(ct>=2&&ct<=5){
      if(col(mv[2])===B) gCapturedBlack.push(mv[2]);
      else gCapturedWhite.push(mv[2]);
    }
  }
  /* Lần đầu đi: chuyển UI sang chế độ chơi */
  if(!gGameStarted){
    gGameStarted=true;
    rankDisplay();
    showCapturedBar();
  }
  updateCaptured();
  var t=typ(gB[mv[0]]);
  /* Lưu board trước nước người để playerMissedHanging kiểm tra quân treo */
  if(isPlayerMove) mv._boardBefore = gB.slice();
  var oldCasB=gCasB, oldEP=gEP;
  gCasB=newCasBit(gCasB,gB,mv,gTurn);
  gHash=updateHash(mv,gB,oldCasB,gCasB,oldEP,mv[6]);
  gB=applyMv(gB,mv);
  gEP=mv[6];
  gHalf=(t===1||mv[2])?0:gHalf+1;
  if(gTurn===B) gFull++;
  if(gTurn===B) gMoveNum++;  /* tăng sau mỗi lượt đen đi = 1 full move */
  gTurn=-gTurn;
  gPosHist.push(gHash);
  gSel=-1; gLegal=[]; gAllLegal=legalMoves(gB,gTurn,gEP,gCasB);
  /* Reset pending chỉ khi người chơi đi — AI đã tính sẵn ở trên, không xóa */
  if(isPlayerMove) gPendingBest = null;

  /* Phân loại nước người chơi nếu qua khai cuộc và đã có pending best */
  if(isPlayerMove){
    gPlayerMoveCount++;
    aiDbgBegin('p' + gPlayerMoveCount);
  }

  /* Chat cũ của máy xóa đi khi người đi */
  if(isPlayerMove){
    gChatMsg = '';
  }

  /* Render ngay để người thấy quân đã đi — không block UI */
  renderBoard(); setStatus();
  checkSplitButton();

  /* ── CLASSIFY: phân loại nước người vừa đi ─────────────────────────────────
     Chỉ chạy khi: người vừa đi + đã qua khai cuộc + đã có pendingBest sẵn.
     savedBest / savedEval là nước & điểm máy đã tính sẵn cho vị trí này
     (pendingBest/pendingEval từ lượt máy đi trước), từ góc nhìn người chơi.

     Thứ tự ưu tiên được thiết kế để TRÁNH gọi evalPlayer khi không cần:
       evalPlayer = -evalMove(vị_trí_hiện_tại) tốn 1–2s trên PPW3
       → chỉ gọi khi thực sự cần tính cpLoss (missedWin, mistake)
       → các nhánh không dùng cpLoss (missedMate, blunder, brilliant, best)
          đều được xử lý TRƯỚC hoặc KHÔNG CẦN evalPlayer                    */
  /* Ngoại lệ khai cuộc: nếu người bắt quân thì luôn classify bất kể nước mấy
     (hy sinh / bắt quân trong khai cuộc là nước đáng gắn nhãn nhất) */
  var isCapture = !!(mv[2] !== undefined && mv[2]);

  /* ── BLUNDER DETECTION ĐỘC LẬP ────────────────────────────────────────────
     Điều kiện A/B/C không cần savedBest — chỉ cần board + nước đi.
     Chạy từ nước đầu tiên cho tất cả nước người chơi.                       */
  if(isPlayerMove && gPlayerMoveCount >= 1){
    (function(mvSnap, boardBefore){
      setTimeout(function(){
        var isBest = savedBest !== null &&
                     (mvSnap[0]*100 + mvSnap[1]) === (savedBest[0]*100 + savedBest[1]);
        if(isBest){
          /* Nước tốt nhất — không blunder. Nếu classify sẽ không chạy (khai cuộc /
             không bắt quân) thì gọi aiMove tại đây; ngược lại nhường cho classify. */
          var clRunForBest = savedBest !== null && (gPlayerMoveCount > OPENING_MOVES || isCapture);
          tMark('bChk|isBest|clRun='+clRunForBest);
          if(!clRunForBest){
            tFlush('classify');
            if(gActive) scheduleAiMove(UI_AFTER_MOVE_DELAY, 'bBest');
          }
          return;
        }
        if(aiWillCaptureHeavy(gB, savedBest, gPC) ||
           playerMissedHanging(boardBefore, mvSnap, gPC) ||
           playerPieceHangsAfterMove(gB, mvSnap, gPC)){
          gBlunderHandled = true;
          gMoveStats['blunder']++;
          tMark('blunder');
          showFeedback('blunder');
          tFlush('feedback');
          if(gActive) setTimeout(function(){ scheduleAiMove(2600, 'blunder'); }, 0);
        } else {
          /* Không blunder — nếu classify đầy đủ sẽ chạy thì nhường cho classify;
             ngược lại gọi aiMove tại đây.                                        */
          var classifyWillRun = savedBest !== null && (gPlayerMoveCount > OPENING_MOVES || isCapture);
          tMark('bChk|noBlunder|clRun='+classifyWillRun);
          if(!classifyWillRun){
            tFlush('classify');
            if(gActive) scheduleAiMove(UI_AFTER_MOVE_DELAY, 'bOk');
          }
        }
      }, UI_AFTER_MOVE_DELAY);
    })(mv, mv._boardBefore);
    /* Chỉ return (chặn fallback) khi classify sẽ không chạy.
       Nếu classify sẽ chạy → không return, để classify tự gọi aiMove. */
    var classifyWillRunOuter = savedBest !== null && (gPlayerMoveCount > OPENING_MOVES || isCapture);
    if(!classifyWillRunOuter) return;
  }

  if(isPlayerMove && savedBest !== null && (gPlayerMoveCount > OPENING_MOVES || isCapture)){
    setTimeout(function(){
      aiDbgAdd('clfy');
      tMark('clfy|handled='+gBlunderHandled+'|act='+gActive);
      if(gBlunderHandled){ gBlunderHandled = false; tFlush('classify'); return; }
      var label = null;
      var mvKey  = mv[0]*100 + mv[1];
      var bestKey = savedBest[0]*100 + savedBest[1];
      var isBestMove = (mvKey === bestKey);

      /* ── BƯỚC 1: Missed Mate ───────────────────────────────────────────────
         savedEval >= 9900 nghĩa là trước nước đi máy đã thấy lộ chiếu hết.
         Người không đi nước đó → bỏ lỡ cơ hội kết thúc ván.
         Chỉ tin kết quả khi evalNow hoàn thành đúng hạn (gPendingEvalNowComplete)
         và đã qua đủ nước (tránh false positive sớm khi engine chưa đủ thông tin).
         Không cần evalPlayer — savedEval một mình đã đủ bằng chứng.        */
      var wasMate = (savedEval >= 9900 && gPendingEvalNowComplete && gMoveNum > OPENING_MOVES + 2);
      if(wasMate && !isBestMove){
        label = 'missedMate';
      }

      /* ── BƯỚC 2: Brilliant ─────────────────────────────────────────────────
         Người đi đúng nước tốt nhất VÀ hy sinh quân nặng vào ô bị tấn công.
         Cần evalPlayer để xác nhận vị trí sau hy sinh vẫn không tệ hơn.
         evalPlayer chỉ chạy ở đây nếu có dấu hiệu hy sinh (sacPiece >= 300). */
      var evalPlayer = 0;
      if(!label && isBestMove){
        var sacPiece = mv[2] ? 0 : (attacked(gB, mv[1], -gPC) ? PVAL[typ(gB[mv[1]])] : 0);
        if(sacPiece >= 300){
          tStart('evalAfterSac');
          evalPlayer = -evalMove(gB, gTurn, gEP, gCasB, gHash);
          tEnd('evalAfterSac');
          var evalDrop = Math.max(0, savedEval - evalPlayer);
          if(evalDrop <= 50){
            label = 'brilliant';
          }
        }
        /* Nếu không brilliant → xét great/greatDef/best (không cần evalPlayer) */
        if(!label){
          var onlyEscape = (gAllLegal.length <= 2);  /* nước bắt buộc — không tính hay */
          if(gAllLegal.length <= 3 && savedEval < -300 && !onlyEscape){
            label = 'greatDef';
          } else {
            var mv0 = gAllLegal[0];
            var hasCapture = mv0 && mv0[2] && PVAL[typ(mv0[2])] >= 300;
            var givesCheck = mv0 && inCheck(applyMv(gB, mv0), -gTurn);
            var genuineEscape = (gAllLegal.length <= 3 && savedEval < -400);
            if(!onlyEscape && (hasCapture || givesCheck || genuineEscape)){
              label = 'great';
            } else {
              label = 'best';
            }
          }
        }
      }

      /* ── BƯỚC 4: evalPlayer — chỉ gọi khi thực sự cần ────────────────────
         Tại đây: !label (chưa kết luận được), !isBestMove (không phải best).
         Cần tính cpLoss = savedEval - evalPlayer để xét missedWin và mistake.

         Gate function shouldRunEvalPlayer tập trung toàn bộ điều kiện skip:
           - Thế trận cân bằng (evalNow trong ngưỡng ±150) → không có cpLoss đáng kể
           - Người đang thắng rõ (savedEval > 900) → tàn cuộc một chiều,
             missedWin cần savedEval >= 600 nhưng chênh <= 50 — nếu savedEval > 900
             thì gần như không còn khả năng missedWin có ý nghĩa → skip an toàn
           - Người đang thua rõ (savedEval < -250) → luôn chạy để bắt mistake  */
      var cpLoss = 0;
      if(!label && !isBestMove){
        var shouldRunEvalPlayer = function(sv, evalNowVal, isBest){
          if(isBest) return false;                          /* đã best — không cần */
          if(Math.abs(evalNowVal) <= 150) return false;    /* thế cân bằng — cpLoss không đáng kể */
          if(sv < -250) return true;                       /* người đang thua rõ — luôn chạy */
          if(sv > 900) return false;                       /* người đang thắng rất rõ — skip an toàn */
          return true;                                     /* còn lại: chạy */
        };
        if(!shouldRunEvalPlayer(savedEval, gPendingEvalNow, isBestMove)){
          /* Không đủ điều kiện chạy evalPlayer — bỏ qua */
          tMark('evalSkip');
        } else {
          tStart('evalPlayer');
          evalPlayer = -evalMove(gB, gTurn, gEP, gCasB, gHash);
          tEnd('evalPlayer');
          cpLoss = savedEval - evalPlayer;
        }
      }

      /* ── BƯỚC 5: Missed Win ────────────────────────────────────────────────
         savedEval >= 600: người đang thắng rõ TRƯỚC nước đi
         evalPlayer <= 50: sau nước đi lợi thế gần như biến mất
         cpLoss >= 400: mất ít nhất 4 tốt — đủ nghiêm trọng để gắn nhãn     */
      if(!label && !isBestMove && savedEval >= 600 && evalPlayer <= 50 && cpLoss >= 400){
        label = 'missedWin';
      }

      /* ── BƯỚC 6: Mistake ───────────────────────────────────────────────────
         cpLoss > 100: mất hơn 1 tốt so với nước tốt nhất.
         Ngưỡng thấp hơn missedWin — bắt các sai lầm vừa không nghiêm trọng.*/
      if(!label && !isBestMove && cpLoss > 100){
        label = 'mistake';
      }

      /* ── Hiển thị kết quả phân loại ───────────────────────────────────────
         Dramatic (brilliant/great/greatDef/missedMate/missedWin/blunder):
           hiện label 2500ms trên status bar rồi mới gọi aiMove.
         Non-dramatic (best/mistake/ok/-ok):
           gọi aiMove ngay sau khi classify xong.                            */
      if(label){
        gMoveStats[label]++;
        tMark(label);
        var dramatic = {brilliant:1, great:1, greatDef:1, missedMate:1, missedWin:1, blunder:1};
        if(dramatic[label]){
          showFeedback(label);
          tFlush('feedback');
          /* setTimeout kép: tick đầu nhường event loop cho Kindle render,
             tick thứ hai (2600ms) chờ feedback hiển thị xong mới gọi aiMove */
          if(gActive) setTimeout(function(){ scheduleAiMove(2600, 'dramatic'); }, 0);
          return;
        }
      } else {
        tMark('-ok');
      }
      /* Non-dramatic: tách tick để Kindle render board trước khi AI bắt đầu */
      tFlush('classify');
      tMark('clfy-callAI|act='+gActive);
      aiDbgAdd('clfyOK');
      if(gActive) scheduleAiMove(UI_AFTER_MOVE_DELAY, 'clfy');
    }, UI_AFTER_MOVE_DELAY + 20);  /* +20ms: đảm bảo luồng blunder độc lập chạy trước */
    return;  /* execMove kết thúc — aiMove sẽ được gọi từ trong setTimeout */
  }

  if(gActive) scheduleAiMove(UI_AFTER_MOVE_DELAY, 'fallback');
}

function aiMove(){
  try{
    aiMoveCore();
  } catch(e){
    aiDbgAdd('ERR:' + (e && e.message ? e.message : e));
    tMark('aiErr');
    tFlush('aiErr');
  }
}

function aiMoveCore(){
  aiDbgAdd('enter:t' + gTurn + '/pc' + gPC);
  tMark('aiMove|act='+gActive+'|turn='+gTurn+'|pc='+gPC);
  if(!gActive||gTurn===gPC){ aiDbgAdd('return'); return; }
  clearThinkTimer();
  var cfg=ELO_CFG[gRank];
  var tl = (gRank===9) ? AI_TIME_LIMIT + AI_TIME_BONUS + AI_TIME_PLUS
         : (gRank===8) ? AI_TIME_LIMIT + AI_TIME_BONUS
         : AI_TIME_LIMIT;
  setStatus();
  var snapHash=gHash;

  /* ── Bắt đầu đo tổng thời gian kể từ khi người vừa đi xong ── */
  var aiMoveStart = Date.now();

  /* ── Điều chỉnh depth/rnd theo tình huống ──────────────────────────────────
     gTiltMoves: khi máy vừa mất quân lớn → tăng randomness tạm thời
     (mô phỏng "tilting" — máy chơi kém hơn một lúc sau khi bị mất quân)    */
  var useDepth = cfg.d;
  var useRnd   = cfg.rnd;

  if(gTiltMoves > 0){ useRnd = Math.min(useRnd + 0.20, 0.60); gTiltMoves--; }
  if(gLast && gLast[2]){
    var capturedVal = PVAL[typ(gLast[2])];
    var aiLostPiece = (col(gLast[2]) === gTurn);
    if(aiLostPiece){
      if(capturedVal >= 500) gTiltMoves = 3;
      else if(capturedVal >= 300) gTiltMoves = 1;
    }
  }

  /* ── Xác định TARGET tổng thời gian theo tình huống ───────────────────────
     Không dùng cố định AI_TIME_LIMIT cho mọi nước — thay đổi để chơi
     tự nhiên hơn: nước buộc / ăn quân đơn giản đi nhanh, phục hồi blunder
     đi chậm và cẩn thận hơn.                                                */
  var isForced  = (gAllLegal.length <= 2);
  var isRecap   = !!(gLast && gLast[2]);
  var isOpening = (gMoveNum <= 10);
  var target;

  if(isForced || isRecap){
    target = 1000 + Math.floor(Math.random() * 500);   /* 1000–1500ms */
  } else if(isOpening){
    target = 1000 + Math.floor(Math.random() * 1000);  /* 1000–2000ms */
  } else if(gBlunderRecovery){
    target = 4000 + Math.floor(Math.random() * 3000);  /* 4000–7000ms: suy nghĩ lâu sau khi tự blunder */
    gBlunderRecovery = false;
  } else {
    target = 1500 + Math.floor(Math.random() * 2500);  /* 1500–4000ms */
  }

  var oldTL=AI_TIME_LIMIT;

  /* ═══════════════════════════════════════════════════════════════════════════
     BƯỚC 1 — evalNow (đánh giá nhanh vị trí hiện tại)
     ═══════════════════════════════════════════════════════════════════════════
     Chạy negamax depth-2 với time limit thấp (EVAL_NOW_TIME) để lấy điểm
     vị trí ngay sau nước người vừa đi, TRƯỚC khi tính bestMove.

     Mục đích kép:
       A) Phát hiện resign sớm: nếu evalNow quá thấp nhiều lượt liên tiếp
          → máy xin thua (tránh kéo dài ván thua rõ).
       B) Điều chỉnh depth: nếu đang thắng lớn (evalNow > 500) → giảm depth
          1 bậc để tiết kiệm thời gian (không cần suy nghĩ sâu khi thắng rõ).

     evalNowComplete = true chỉ khi hoàn thành đúng hạn — dùng để tránh
     resign sai khi depth-2 bị timeout (kết quả không đáng tin).

     Chỉ chạy sau khai cuộc (gMoveNum > OPENING_MOVES) vì khai cuộc
     có opening book, evalNow không cần thiết.                               */
  var EVAL_NOW_TIME = 400;  /* giới hạn ms cho evalNow — đủ depth-2 trên PPW3 */

  var evalNow = 0;
  var evalNowComplete = false;
  if(gMoveNum > OPENING_MOVES){
    var dbgEvalNowT0 = Date.now();
    aiDbgAdd('evalNow');
    tStart('evalNow');
    var oldCI_en = AI_CHECK_INTERVAL;
    AI_TIME_LIMIT = EVAL_NOW_TIME;
    AI_CHECK_INTERVAL = 32;  /* PPW3: phải là lũy thừa 2 để bitwise & hoạt động đúng như modulo */
    aiTimedOut = false; aiNodeCount = 0; aiStartTime = Date.now(); searchStack = [];
    evalNow = negamax(gB, gTurn, gEP, gCasB, 2, -INF, INF, 0, snapHash, false);
    evalNowComplete = !aiTimedOut;
    AI_TIME_LIMIT = tl;
    AI_CHECK_INTERVAL = oldCI_en;
    tEnd('evalNow');
    aiDbgAdd('evalNow=' + (Date.now() - dbgEvalNowT0) + (aiTimedOut ? 'TO' : ''));
    if(evalNowComplete && useDepth > 1 && evalNow > 500) useDepth = useDepth - 1;
  }

  var evalBefore = evalNow;
  gPendingEvalNow = evalNow;  /* lưu để classify lượt sau dùng làm evalSkip threshold */
  gPendingEvalNowComplete = evalNowComplete;  /* lưu để missedMate không dùng điểm không đáng tin */
  /* Resign chỉ được tính khi evalNow hoàn thành đúng hạn — tránh resign sai */
  if(evalNowComplete){
    if(gMoveNum>12 && evalBefore<=RESIGN_SCORE) gBadEvalStreak++;
    else if(evalBefore>-900) gBadEvalStreak=0;
  }
  if(gBadEvalStreak>=RESIGN_STREAK){
    AI_TIME_LIMIT=oldTL;
    tFlush('resign');
    aiResign();
    return;
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     BƯỚC 2 — bestMove (tính nước máy sẽ đi)
     ═══════════════════════════════════════════════════════════════════════════
     Iterative deepening negamax với alpha-beta, aspiration window, LMR.
     Đây là bước tốn thời gian nhất (~3–5s trên PPW3).

     Input: vị trí hiện tại (gB, gTurn, gEP, gCasB) + depth + rnd
     Output: nước đi tốt nhất tìm được trong time limit

     useDepth / useRnd đã được điều chỉnh ở bước chuẩn bị trên.
     Fallback về depth-1 nếu bestMove trả về null (không tìm được nước nào).  */
  tStart('bestMove');
  var dbgBestT0 = Date.now();
  aiDbgAdd('best');
  var mv=bestMove(gB,gTurn,gEP,gCasB,useDepth,useRnd,snapHash);
  var mainTimedOut = aiTimedOut;
  aiDbgAdd('best=' + (mv ? mvUci(mv) : 'null') + '/' + (Date.now() - dbgBestT0) + (aiTimedOut ? 'TO' : ''));
  tEnd('bestMove');
  AI_TIME_LIMIT=oldTL;
  if(!mv){
    aiDbgAdd('fb1');
    mv = bestMove(gB, gTurn, gEP, gCasB, 1, 0, snapHash);
    if(!mv){ aiDbgAdd('noMove'); tFlush('noMove'); setStatus(); return; }
  }

  /* Tính toán vị trí tương lai (sau khi máy đi mv) để dùng cho các bước sau */
  var futureBoard = applyMv(gB, mv);
  var futureTurn  = -gTurn;
  var futureEP    = mv[6];
  var futureCasB  = newCasBit(gCasB, gB, mv, gTurn);
  var futureHash  = computeHash(futureBoard, futureTurn, futureEP, futureCasB);

  /* ═══════════════════════════════════════════════════════════════════════════
     BƯỚC 3 — pendingBest (đoán nước người sẽ đi tiếp theo)
     ═══════════════════════════════════════════════════════════════════════════
     Từ vị trí futureBoard (sau nước máy vừa chọn), tính nước tốt nhất
     cho người chơi (futureTurn). Kết quả lưu vào gPendingBest.

     Mục đích: khi người đi xong, classify ngay lập tức có sẵn "nước tốt
     nhất mà lẽ ra nên đi" (savedBest) mà không cần tính lại từ đầu.
     → Tiết kiệm 3–5s search trong luồng classify.

     Dùng CLASSIFY_TIME (~1200ms) thay vì AI_TIME_LIMIT để không chiếm
     quá nhiều thời gian — depth đạt được thường chỉ là 2–3.

     Chỉ chạy sau khai cuộc + đã đủ nước (OPENING_MOVES + 2) để tránh
     lãng phí tài nguyên trong phase đầu ván.                               */
  var postLeft = tl - (Date.now() - aiMoveStart);
  var enoughPostTime = postLeft >= CLASSIFY_TIME;
  var worthPending = Math.abs(evalNow) < 1200 && !mainTimedOut && enoughPostTime;
  if(mainTimedOut) aiDbgAdd('skipPost:bestTO');
  else if(!enoughPostTime) aiDbgAdd('skipPost:left' + postLeft);
  if(gPlayerMoveCount >= OPENING_MOVES && worthPending){
    var dbgPendingT0 = Date.now();
    aiDbgAdd('pending');
    tStart('pendingBest');
    var oldCI_pb = AI_CHECK_INTERVAL;
    aiTimedOut = false; aiNodeCount = 0; aiStartTime = Date.now(); searchStack = [];
    AI_TIME_LIMIT = CLASSIFY_TIME;
    AI_CHECK_INTERVAL = 16;
    gPendingBest = bestMove(futureBoard, futureTurn, futureEP, futureCasB, 3, 0, futureHash);
    AI_CHECK_INTERVAL = oldCI_pb;
    AI_TIME_LIMIT = oldTL;  /* [v6-fix] restore ngay sau bestMove, trước mọi nhánh if/else —
                               tránh AI_TIME_LIMIT bị kẹt ở CLASSIFY_TIME khi gPendingBest=null */
    tEnd('pendingBest');
    var pendingTimedOut = aiTimedOut;
    aiDbgAdd('pending=' + (gPendingBest ? mvUci(gPendingBest) : 'null') + '/' + (Date.now() - dbgPendingT0) + (pendingTimedOut ? 'TO' : ''));

    /* ═══════════════════════════════════════════════════════════════════════
       BƯỚC 4 — evalPending (đánh giá vị trí sau khi người đi pendingBest)
       ═══════════════════════════════════════════════════════════════════════
       Áp dụng gPendingBest lên futureBoard để ra nb2 (vị trí sau cả hai
       bên đi xong một lượt), rồi đánh giá nb2 từ góc nhìn người chơi.
       Kết quả lưu vào gPendingEval.

       Mục đích: cung cấp savedEval cho classify lượt sau mà không cần
       search thêm. Đây là "baseline" — nếu người đi đúng pendingBest thì
       vị trí đáng giá gPendingEval centipawn từ góc nhìn của họ.

       Lưu ý: evalPending chạy evalMove trên nb2 (vị trí sau CẢ HAI đi),
       không phải trên futureBoard (chỉ sau máy đi). Dấu âm (-evalMove)
       vì evalMove trả về từ góc -futureTurn (máy), cần đổi sang góc người.

       nb2Hash tính lại từ đầu (computeHash) vì đây là vị trí mới hoàn toàn,
       không dùng futureHash (hash của futureBoard, khác nb2).              */
    postLeft = tl - (Date.now() - aiMoveStart);
    if(gPendingBest && !pendingTimedOut && postLeft >= CLASSIFY_TIME){
      var dbgEvalPendingT0 = Date.now();
      aiDbgAdd('evalPend');
      tStart('evalPending');
      aiTimedOut = false; aiNodeCount = 0; aiStartTime = Date.now(); searchStack = [];
      var nb2      = applyMv(futureBoard, gPendingBest);
      var nc2      = newCasBit(futureCasB, futureBoard, gPendingBest, futureTurn);
      var nb2Hash  = computeHash(nb2, -futureTurn, gPendingBest[6], nc2);
      gPendingEval = -evalMove(nb2, -futureTurn, gPendingBest[6], nc2, nb2Hash);
      tEnd('evalPending');
      aiDbgAdd('evalPend=' + (Date.now() - dbgEvalPendingT0) + (aiTimedOut ? 'TO' : ''));
    } else {
      if(gPendingBest && pendingTimedOut) aiDbgAdd('skipEvalPend:pTO');
      else if(gPendingBest) aiDbgAdd('skipEvalPend:left' + postLeft);
      if(!gPendingBest) gPendingBest = null;
      gPendingEval = 0;
    }
  } else {
    /* worthPending=false: thế cờ ngã ngũ hoặc evalNow chưa hoàn thành —
       xóa pending cũ để tránh classify dùng stale data từ lượt trước */
    gPendingBest = null; gPendingEval = 0;
  }

  tStart('offerDraw');
  if(gMoveNum >= 18) maybeOfferDraw(evalBefore);
  tEnd('offerDraw');

  gChatMsg = '';
  /* Chat duy nhất hiện sau khi máy đi xong.
     Ưu tiên: phản ứng nước người (chat A) > phản ứng nước máy (chat B)
     Nếu người vừa có dramatic (blunder/brilliant), dùng gDramaticChat làm chat A
     và không cho loseBig/goodMove đè lên. */

  /* Nếu người vừa blunder/brilliant → ưu tiên hiện chat đó, bỏ qua chat máy */
  if(gPlayerDramatic === 'blunder' || gPlayerDramatic === 'brilliant'){
    gChatMsg = gDramaticChat;  /* gDramaticChat đã được set trong showFeedback */
    gDramaticChat = ''; gDramaticLabel = '';
    gPlayerDramatic = '';
  } else {
    gPlayerDramatic = '';

  /* Máy vừa ăn quân lớn của người → loseBig */
  var justLostBig = !!(mv[2] && col(mv[2])===gPC && PVAL[typ(mv[2])]>=500);

  /* Nước máy đạt brilliant: hy sinh quân nặng mà vẫn không thua thế */
  var _mvVal = PVAL[typ(gB[mv[0]])];
  var aiSacPiece = (!mv[2] && _mvVal >= 300 && attacked(gB, mv[1], gPC)) ? _mvVal : 0;
  var aiIsBrilliant = (aiSacPiece >= 300);
  /* Nước máy đạt great: chiếu người, hoặc ăn quân nặng */
  var aiCapHeavy = !!(mv[2] && col(mv[2])===gPC && PVAL[typ(mv[2])]>=300);
  var aiIsGreat  = aiCapHeavy || inCheck(futureBoard, gPC);

  if(justLostBig) gChatMsg = randChat('loseBig');
  else if(aiIsBrilliant || aiIsGreat) gChatMsg = randChat('goodMove');
  else if(!gOpeningChatShown && gMoveNum>=4 && gMoveNum<=6 && Math.random()<CHAT_PROB_OPENING_MID){
    gOpeningChatShown=true; gChatMsg = randChat('openingMid');
  }
  else if(!gExchangeChatShown && gMoveNum >= 16 && isExchangePosition()){
    gExchangeChatShown=true; gChatMsg = randChat('exchange');
  }
  else if(evalBefore > 700 && Math.random()<CHAT_PROB_WINNING) gChatMsg = randChat('winning');
  else if(evalBefore <-500 && Math.random()<CHAT_PROB_LOSING) gChatMsg = randChat('losing');
  else if(Math.random()<CHAT_PROB_IDLE) gChatMsg = randChat('idle');
  } /* end else (not player dramatic) */

  tStart('evalAfterAI');
  /* ═══════════════════════════════════════════════════════════════════════════
     BƯỚC 5 — evalAfterAI (ước tính điểm sau khi máy đi)
     ═══════════════════════════════════════════════════════════════════════════
     Dùng gPendingEval làm proxy cho "vị trí tốt của người sau nước máy" —
     đây là điểm từ góc người nếu họ đi đúng nước pendingBest.

     Nếu gPendingBest null (chiếu hết / hết nước / pendingBest thất bại)
     → fallback về evalNow (điểm vị trí hiện tại, trước nước máy).

     evalAfterAI dùng để:
       - Phát hiện máy tự blunder: evalAfterAI << evalBefore → gBlunderRecovery
         (máy sẽ suy nghĩ lâu hơn lượt tiếp để bù đắp)
       - Hiển thị chat phù hợp (đang thắng/thua/cân bằng)                   */
  var evalAfterAI = gPendingBest ? gPendingEval : evalNow;
  tEnd('evalAfterAI');
  if(evalAfterAI < evalBefore - 300){
    gBlunderRecovery = true;
    /* if(!gChatMsg) gChatMsg = randChat('aiBlunder'); */  /* tạm ẩn — tự khai nước đi tệ */
  }

  /* ── Tính thời gian còn lại cần chờ để đủ TARGET ── */
  var elapsed = Date.now() - aiMoveStart;
  var remaining = Math.max(0, target - elapsed);
  tMark('wait(' + remaining + 'ms)');
  aiDbgAdd('wait=' + remaining);

  setTimeout(function(){
    try{
      aiDbgAdd('exec=' + mvUci(mv));
      tStart('execMove');
      execMove(mv);
      tEnd('execMove');
      aiDbgAdd('done');
      tFlush('done');
    } catch(e){
      aiDbgAdd('ERRexec:' + (e && e.message ? e.message : e));
      tMark('aiExecErr');
      tFlush('aiExecErr');
    }

  }, remaining);
}

function showPromo(targets){
  var overlay=document.getElementById('promo-bg');
  var row=document.getElementById('promo-row');
  row.innerHTML='';
  for(var i=0;i<targets.length;i++){
    (function(mv){
      var btn=document.createElement('div');
      btn.className='promo-btn';
      btn.textContent=SYM[typ(mv[3])][col(mv[3])===W?0:1];
      btn.onclick=function(){
        overlay.className='promo-bg';
        execMove(mv);
      };
      row.appendChild(btn);
    })(targets[i]);
  }
  overlay.className='promo-bg show';
}

/* ═══════════════════════════════════════════════════
   MOVE HISTORY
   ═══════════════════════════════════════════════════ */
var FLS='abcdefgh';
var PNM=['','','N','B','R','Q','K'];

function addHistory(mv){
  var p=gB[mv[0]], t=typ(p);
  var ff=FLS[fl(mv[0])], tr=rk(mv[1])+1, tf=FLS[fl(mv[1])];
  var note='';
  if(mv[4]==='WK'||mv[4]==='BK') note='O-O';
  else if(mv[4]==='WQ'||mv[4]==='BQ') note='O-O-O';
  else {
    if(t===1) note=(mv[2]||mv[5]>=0)?ff+'x'+tf+tr:tf+tr;
    else note=PNM[t]+(mv[2]?'x':'')+tf+tr;
    if(mv[3]) note+='='+PNM[typ(mv[3])];
  }
  var nb=applyMv(gB,mv), nep=mv[6], nc=newCasBit(gCasB,gB,mv,gTurn);
  var nt=-gTurn;
  if(inCheck(nb,nt)){
    var nm=legalMoves(nb,nt,nep,nc);
    if(!nm.length) note+='#';
    else note+='+';
  }

  if(gTurn===W){
    gHist.push(gFull+'.'+note);
  } else {
    if(gHist.length) gHist[gHist.length-1]+=' '+note;
    else gHist.push('...'+note);
  }
  /* Hiện 8 nước gần nhất, gợi ý có thể bấm để xem đầy đủ */
  var preview = gHist.slice(-8).join('  ');
  var el = document.getElementById('history');
  if(el) el.textContent = (gHist.length > 8 ? '\u2026 ' : '') + preview + '  \u25bc';
}

/* Hàm tách log từ timing-log DOM sang detail-log */
function showDetailOverlay(){
  /* Render toàn bộ nước đi */
  var movesEl = document.getElementById('detail-moves');
  if(movesEl){
    if(!gHist.length){
      movesEl.innerHTML = '<span style="color:#888">Ch\u01b0a c\u00f3 n\u01b0\u1edbc \u0111i n\u00e0o.</span>';
    } else {
      var html = '';
      for(var i=0; i<gHist.length; i++){
        var parts = gHist[i].split(' ');
        html += '<span class="mv-w">' + parts[0] + '</span>';
        if(parts[1]) html += ' <span class="mv-b">' + parts[1] + '</span>';
        html += '&nbsp;&nbsp;';
      }
      movesEl.innerHTML = html;
    }
  }
  /* Render log đầy đủ từ _tAllLog, từ cuối về đầu (gần nhất trên cùng) */
  var dst = document.getElementById('detail-log');
  if(dst){
    if(!_tAllLog.length && !_aiDbg){
      dst.innerHTML = '<span style="color:#aaa">Ch\u01b0a c\u00f3 log n\u00e0o.</span>';
    } else {
      var logHtml = '';
      if(_aiDbg) logHtml += '<div class="detail-log-row">#AI ' + _aiDbg + '</div>';
      for(var j=_tAllLog.length-1; j>=0; j--){
        logHtml += '<div class="detail-log-row">' + _tAllLog[j] + '</div>';
      }
      dst.innerHTML = logHtml;
    }
  }
  var ov = document.getElementById('detail-overlay');
  if(ov){ ov.className = 'detail-overlay show'; }
}

function hideDetailOverlay(){
  var ov = document.getElementById('detail-overlay');
  if(ov){ ov.className = 'detail-overlay'; }
}
